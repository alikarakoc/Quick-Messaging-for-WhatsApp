<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Quick Messaging for WhatsApp</title>
    <link rel="stylesheet" href="/css/intlTelInput.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="popup">

      <header class="popup-header">
        <img src="/images/hello.png" alt="" class="popup-logo" aria-hidden="true" />
        <div class="popup-header-text">
          <h1 class="popup-title">Quick Message</h1>
          <p class="popup-subtitle">Send without saving contacts</p>
        </div>
      </header>

      <main class="popup-body">

        <div class="field">
          <label class="field-label" for="ePhoneNumber">Phone number</label>
          <input
            type="tel"
            id="ePhoneNumber"
            class="field-input"
            autocomplete="tel"
          />
          <span id="valid-msg" class="field-hint field-hint--success hidden">
            ✓ Valid number
          </span>
          <span id="error-msg" class="field-hint field-hint--error hidden"></span>
        </div>

        <label class="toggle-row" for="cbMessageStatus">
          <input
            type="checkbox"
            id="cbMessageStatus"
            class="toggle-checkbox"
          />
          <span class="toggle-label">Include a message</span>
        </label>

        <div class="field hidden" id="divMessage">

          <div id="imageZone" class="image-zone">
            <div id="imagePlaceholder" class="image-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21"/>
              </svg>
              <span>Paste image (⌘V / Ctrl+V)</span>
            </div>
            <div id="imagePreview" class="image-preview hidden">
              <img id="previewImg" alt="Image preview" />
              <button id="clearImage" class="clear-image" type="button" title="Remove image">×</button>
            </div>
          </div>

          <label class="field-label" for="eMessage">Caption (optional)</label>
          <textarea
            id="eMessage"
            class="field-input field-textarea"
            placeholder="Type a caption..."
          ></textarea>

          <label class="toggle-row toggle-row--sub" for="cbAutoSend">
            <input
              type="checkbox"
              id="cbAutoSend"
              class="toggle-checkbox"
            />
            <span class="toggle-label">Send automatically</span>
          </label>
        </div>

        <button id="btnSend" class="btn-send" disabled>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
          Send
        </button>

      </main>

      <footer class="popup-footer">
        <p class="footer-note">No data is stored. Messages are sent via WhatsApp Web.</p>
        <div class="footer-links">
          <a href="https://github.com/alikarakoc/Quick-Messaging-for-WhatsApp" target="_blank" rel="noopener noreferrer">GitHub</a>
          <span class="footer-sep" aria-hidden="true">·</span>
          <a href="https://www.linkedin.com/in/alikarakoc/" target="_blank" rel="noopener noreferrer">Author</a>
        </div>
      </footer>

    </div>

    <script src="/scripts/intlTelInput.min.js"></script>
    <script src="/scripts/libphonenumber-max.js"></script>
    <script src="/popup.js"></script>
  </body>
</html>
